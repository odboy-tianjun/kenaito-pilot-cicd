concurrent = 1
check_interval = 0

[session_server]
 session_timeout = 1800

[[runners]]
    name = "builder"
    url = "http://219.151.187.115:5000"
    token = "xxxxx"
    executor = "docker"
    [runners.custom_build_dir]
    [runners.cache]
        [runners.cache.s3]
        [runners.cache.gcs]
        [runners.cache.azure]
    [runners.docker]
        tls_verify = false
        image = "registry.cn-shanghai.aliyuncs.com/odboy/kenaito-cicd:system-alinux3"
        # helper_image = "m.daocloud.io/gitlab/gitlab-runner-helper:x86_64-v16.0.2"
        # 必须要开特权
        privileged = true
        disable_entrypoint_overwrite = false
        oom_kill_disable = false
        disable_cache = false
        volumes = ["/cache"]
        shm_size = 0
